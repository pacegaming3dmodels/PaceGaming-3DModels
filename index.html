<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Pace 3D Studio</title>
  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #0f0f0f;
      color: white;
    }
    header {
      padding: 20px;
      text-align: center;
      background: #111;
      border-bottom: 1px solid #222;
    }
    h1 {
      margin: 0;
      color: #00ffd5;
    }
    .container {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
      gap: 20px;
      padding: 30px;
    }
    .card {
      background: #1a1a1a;
      padding: 15px;
      border-radius: 12px;
    }
    iframe {
      width: 100%;
      height: 300px;
      border-radius: 10px;
      border: none;
    }
    .buy {
      margin-top: 15px;
      display: inline-block;
      padding: 10px 20px;
      background: #00ffd5;
      color: black;
      text-decoration: none;
      border-radius: 20px;
      font-weight: bold;
    }
  </style>
</head>

<body>

<header>
  <h1>Pace 3D Studio</h1>
  <p>Game-ready battle royale style 3D models</p>
</header>

<div class="container">

  <div class="card">
    <iframe src="PASTE_SKETCHFAB_LINK_HERE"></iframe>
    <h2>Battle Royale Character</h2>
    <a class="buy" href="PASTE_GUMROAD_LINK_HERE">Buy Now</a>
  </div>

</div>

</body>
</html>
