<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Pace 3D Studio</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<!-- GOOGLE FONT -->
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

<style>
*{box-sizing:border-box}
body{
  margin:0;
  font-family:'Poppins',sans-serif;
  background:#0b0b0b;
  color:white;
}
header{
  padding:80px 20px;
  text-align:center;
  background:radial-gradient(circle at top,#00ffd522,#000 65%);
}
header h1{
  font-size:52px;
  color:#00ffd5;
  margin:0;
}
header p{
  font-size:20px;
  opacity:.75;
}

.gallery{
  padding:40px;
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(280px,1fr));
  gap:25px;
}

.card{
  background:#151515;
  border-radius:16px;
  overflow:hidden;
  transition:.3s;
}
.card:hover{
  transform:translateY(-8px);
  box-shadow:0 10px 30px #00ffd520;
}

iframe{
  width:100%;
  height:220px;
  border:none;
}

.card h3{
  margin:10px;
  font-weight:500;
}

.buy{
  display:block;
  margin:10px auto 18px;
  width:150px;
  padding:10px;
  text-align:center;
  background:#00ffd5;
  color:black;
  border-radius:25px;
  font-weight:600;
  cursor:pointer;
  text-decoration:none;
}
.buy:hover{background:#00e6c2}

footer{
  padding:20px;
  text-align:center;
  color:#666;
  font-size:14px;
}

/* PAYMENT MODAL */
.modal{
  position:fixed;
  inset:0;
  background:#000c;
  display:none;
  align-items:center;
  justify-content:center;
  z-index:10;
}
.modal-box{
  background:#111;
  padding:25px;
  border-radius:18px;
  width:90%;
  max-width:420px;
  text-align:center;
}
.close{
  float:right;
  cursor:pointer;
  opacity:.7;
}
</style>
</head>

<body>

<header>
  <h1>Pace 3D Studio</h1>
  <p>Premium game-ready 3D characters</p>
</header>

<section class="gallery">

  <!-- MODEL 1 -->
  <div class="card">
    <iframe src="https://sketchfab.com/models/f832ead046e04670bd1d8d9f619e74ba/embed"></iframe>
    <h3>Battle Royale Character</h3>
    <div class="buy" onclick="openPay('https://www.creem.io/test/payment/prod_4BwgXcvLej9fhuEqMMm6e4')">
      Buy
    </div>
  </div>

  <!-- MODEL 2 -->
  <div class="card">
    <iframe src="https://sketchfab.com/models/386cf5f2c00341109e3fe07617a3dc1d/embed"></iframe>
    <h3>Freefire Girl Character</h3>
    <div class="buy" onclick="openPay('https://www.creem.io/test/payment/prod_4BwgXcvLej9fhuEqMMm6e4')">
      Buy
    </div>
  </div>

</section>

<footer>
© 2026 Pace 3D Studio
</footer>

<!-- PAYMENT POPUP -->
<div class="modal" id="pay">
  <div class="modal-box">
    <span class="close" onclick="closePay()">✖</span>
    <h2>Checkout</h2>
    <p>Secure payment</p>
    <a id="payLink" class="buy" href="#" target="_blank">Pay Now</a>
  </div>
</div>

<script>
function openPay(link){
  document.getElementById("payLink").href = link;
  document.getElementById("pay").style.display = "flex";
}
function closePay(){
  document.getElementById("pay").style.display = "none";
}
</script>

</body>
</html>
