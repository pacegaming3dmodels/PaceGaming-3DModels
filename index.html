<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Pace 3D Studio</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
*{box-sizing:border-box}
body{
  margin:0;
  font-family:Arial,Helvetica,sans-serif;
  background:#0b0b0b;
  color:white;
}
header{
  height:90vh;
  display:flex;
  flex-direction:column;
  justify-content:center;
  align-items:center;
  text-align:center;
  background:radial-gradient(circle at top,#00ffd520,#000 60%);
}
header h1{
  font-size:52px;
  color:#00ffd5;
}
header p{
  font-size:20px;
  opacity:.8;
}
.gallery{
  padding:40px;
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(280px,1fr));
  gap:25px;
}
.card{
  background:#151515;
  border-radius:14px;
  overflow:hidden;
  transition:.3s;
}
.card:hover{
  transform:translateY(-6px);
}
iframe{
  width:100%;
  height:220px;
  border:none;
}
.card h3{
  padding:10px;
  margin:0;
}
.buy{
  display:block;
  margin:10px auto 15px;
  width:140px;
  text-align:center;
  padding:10px;
  background:#00ffd5;
  color:black;
  border-radius:20px;
  font-weight:bold;
  text-decoration:none;
  cursor:pointer;
}
footer{
  padding:20px;
  text-align:center;
  color:#666;
}

/* MODAL */
.modal{
  position:fixed;
  inset:0;
  background:#000c;
  display:none;
  align-items:center;
  justify-content:center;
}
.modal-box{
  background:#111;
  padding:25px;
  border-radius:16px;
  width:90%;
  max-width:400px;
  text-align:center;
}
.close{
  float:right;
  cursor:pointer;
  color:#aaa;
}
</style>
</head>

<body>

<header>
  <h1>Pace 3D Studio</h1>
  <p>Explore & buy game-ready 3D models</p>
</header>

<section class="gallery">

  <!-- MODEL 1 -->
  <div class="card">
    <iframe src="https://sketchfab.com/models/f832ead046e04670bd1d8d9f619e74ba/embed"></iframe>
    <h3>Battle Royale Character</h3>
    <div class="buy" onclick="openPay()">Buy</div>
  </div>

  <!-- MODEL 2 -->
  <div class="card">
    <iframe src="https://sketchfab.com/models/386cf5f2c00341109e3fe07617a3dc1d/embed"></iframe>
    <h3>Freefire Girl Character</h3>
    <div class="buy" onclick="openPay()">Buy</div>
  </div>

</section>

<footer>
© 2026 Pace 3D Studio
</footer>

<!-- PAYMENT MODAL -->
<div class="modal" id="pay">
  <div class="modal-box">
    <span class="close" onclick="closePay()">✖</span>
    <h2>Buy Model</h2>
    <p>Secure checkout</p>
    <!-- replace with real payment link -->
    <a class="buy" href="https://www.creem.io/test/payment/prod_4BwgXcvLej9fhuEqMMm6e4">
      Pay Now
    </a>
  </div>
</div>

<script>
function openPay(){document.getElementById('pay').style.display='flex'}
function closePay(){document.getElementById('pay').style.display='none'}
</script>

</body>
</html>
